<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milhão Gold</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-bottom: 2px solid gold;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid gold;
  border-radius: 10px;
  margin: 10px;
  padding: 20px;
  width: 200px;
  text-align: center;
}

h2 {
  color: gold;
}

/* PROGRESSO */
.barra {
  width: 80%;
  height: 20px;
  background: #333;
  margin: 20px auto;
  border-radius: 10px;
}

.progresso {
  height: 100%;
  width: 0%;
  background: gold;
  border-radius: 10px;
}

/* BOTÃO */
button {
  background: gold;
  border: none;
  padding: 10px;
  cursor: pointer;
}

/* ESCONDER */
.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h1>💰 Dashboard Premium</h1>
</header>

<section>

<h2>📊 Seu Painel</h2>

<div class="dashboard">
  <div class="card">
    <h3>XP</h3>
    <p id="xp">0</p>
  </div>

  <div class="card">
    <h3>Nível</h3>
    <p id="nivel">1</p>
  </div>

  <div class="card">
    <h3>Aulas feitas</h3>
    <p id="aulas">0</p>
  </div>
</div>

<div class="barra">
  <div class="progresso" id="barraXP"></div>
</div>

</section>

<section id="pratica">
  <h2>🎯 Prática</h2>

  <p>10 + 5 = ?</p>
  <input id="resposta">
  <button onclick="responder()">Responder</button>
  <p id="msg"></p>
</section>

<script>
let xp = localStorage.getItem("xp") || 0;
let aulas = localStorage.getItem("aulas") || 0;

function atualizar() {
  document.getElementById("xp").innerText = xp;
  document.getElementById("aulas").innerText = aulas;

  let nivel = Math.floor(xp / 50) + 1;
  document.getElementById("nivel").innerText = nivel;

  let progresso = (xp % 50) * 2;
  document.getElementById("barraXP").style.width = progresso + "%";
}

function responder() {
  let r = document.getElementById("resposta").value;
  let msg = document.getElementById("msg");

  if (r == 15) {
    msg.innerText = "🔥 Acertou! +10 XP";
    xp = parseInt(xp) + 10;
    aulas++;
  } else {
    msg.innerText = "❌ Errou!";
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("aulas", aulas);

  atualizar();
}

atualizar();
</script>

</body>
</html>
