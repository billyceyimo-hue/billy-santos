<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo do Ursinho</title>
<style>
    body {
        margin: 0;
        font-family: Arial;
        text-align: center;
        background: #f0f8ff;
    }

    #menu {
        padding: 50px;
    }

    #gameCanvas {
        background: #87ceeb;
        display: none;
        margin: auto;
        border: 3px solid #333;
    }

    button {
        padding: 15px 30px;
        font-size: 20px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
        background: pink;
    }

    #winMessage {
        display: none;
        font-size: 50px;
        color: red;
        margin-top: 20px;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>🐻 Jogo do Ursinho</h1>
    <button onclick="startGame()">Jogar</button>
</div>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<div id="winMessage">EU TE AMO ❤️</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = { x: 50, y: 300, size: 30, dy: 0, jumping: false };
let gravity = 0.5;

let hearts = [];
let obstacles = [];
let score = 0;

function startGame() {
    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";

    // Criar corações
    for (let i = 0; i < 5; i++) {
        hearts.push({
            x: Math.random() * 550,
            y: Math.random() * 300
        });
    }

    // Criar obstáculos
    for (let i = 0; i < 3; i++) {
        obstacles.push({
            x: 200 + i * 120,
            y: 320,
            width: 30,
            height: 30
        });
    }

    gameLoop();
}

function drawPlayer() {
    ctx.fillStyle = "brown";
    ctx.fillRect(player.x, player.y, player.size, player.size);
}

function drawHearts() {
    ctx.fillStyle = "red";
    hearts.forEach((h, index) => {
        ctx.beginPath();
        ctx.arc(h.x, h.y, 10, 0, Math.PI * 2);
        ctx.fill();

        // colisão
        if (
            player.x < h.x + 10 &&
            player.x + player.size > h.x &&
            player.y < h.y + 10 &&
            player.y + player.size > h.y
        ) {
            hearts.splice(index, 1);
            score++;
        }
    });
}

function drawObstacles() {
    ctx.fillStyle = "black";
    obstacles.forEach(o => {
        ctx.fillRect(o.x, o.y, o.width, o.height);

        // colisão
        if (
            player.x < o.x + o.width &&
            player.x + player.size > o.x &&
            player.y < o.y + o.height &&
            player.y + player.size > o.y
        ) {
            alert("Você bateu! 😢");
            location.reload();
        }
    });
}

function update() {
    player.dy += gravity;
    player.y += player.dy;

    if (player.y > 350) {
        player.y = 350;
        player.jumping = false;
    }

    if (score === 5) {
        canvas.style.display = "none";
        document.getElementById("winMessage").style.display = "block";
        return;
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPlayer();
    drawHearts();
    drawObstacles();
    update();

    requestAnimationFrame(gameLoop);
}

// CONTROLES
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") player.x += 20;
    if (e.key === "ArrowLeft") player.x -= 20;
    if (e.key === "ArrowUp" && !player.jumping) {
        player.dy = -10;
        player.jumping = true;
    }
    if (e.key === "ArrowDown") player.y += 20;
});
</script>

</body>
</html>
