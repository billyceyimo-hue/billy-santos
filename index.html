<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Jogo do Ursinho</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fce4ec;
      text-align: center;
    }
    #menu {
      padding: 50px;
      margin-top: 150px;
    }
    button {
      padding: 20px 40px;
      font-size: 24px;
      cursor: pointer;
    }
    canvas {
      background: #fff;
      display: none;
      margin: auto;
      border: 3px solid #f48fb1;
      touch-action: none; /* Evita scroll ao tocar */
    }
    #controls {
      display: none;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ffe0f0;
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
      margin-bottom: 20px;
    }
    .control-button {
      width: 60px;
      height: 60px;
      font-size: 24px;
      background: #f48fb1;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
    #finalMessage {
      display: none;
      font-size: 50px;
      color: red;
      margin-top: 100px;
    }
  </style>
</head>
<body>

  <div id="menu">
    <h1>🐻 Jogo do Ursinho 💖</h1>
    <button onclick="startGame()">Jogar</button>
  </div>

  <canvas id="gameCanvas"
